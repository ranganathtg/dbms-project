<!DOCTYPE html>
<html>
<head>
    <title>{{ t['login'] }}</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <style>
      
        .card {
            border-radius: 12px;
        }
    </style>
</head>

<body>

<div class="top-header">

    <!-- Left: Logo -->
    <div class="logo">
        <img src="{{ url_for('static', filename='images/logo.jpeg') }}" alt="logo">
    </div>

    <!-- Center: Title -->
    <div class="title">
        GrievTech
    </div>

    <!-- Right: Language -->
    <div class="lang">
        <a href="/set_language/en">English</a> |
        <a href="/set_language/kn">ಕನ್ನಡ</a>
    </div>

</div>
<div class="container d-flex justify-content-center align-items-center vh-100">

    <div class="form-container glass-card" style="width: 350px;">

        <!-- 🔹 Title -->
        <h3 class="text-center mb-3">{{ t['login'] }}</h3>

        <!-- 🔹 Error Message -->
        {% if error %}
        <div class="alert alert-danger text-center">
            {{ error }}
        </div>
        {% endif %}

        <!-- 🔹 Form -->
        <form method="POST" action="/login">

            <div class="mb-3">
                <input type="email" name="email" class="form-control"
                       placeholder="{{ t['email'] }}" required>
            </div>

            <div class="mb-3">
                <input type="password" name="password" class="form-control"
                       placeholder="{{ t['password'] }}" required>
            </div>

            <button type="submit" class="btn btn-primary w-100">
                {{ t['login'] }}
            </button>

        </form>

        <!-- 🔹 Extra Options -->
        <div class="text-center mt-3">

            <!-- Forgot Password -->
            <a href="/forgot-password" class="text-danger d-block mb-2">
                {{ t['forgot_password'] }}
            </a>

            <!-- Back to Register -->
            <a href="/register" class="btn btn-outline-secondary w-100">
                {{ t['back_to_register'] }}
            </a>

        </div>

    </div>

</div>

</body>
</html>
