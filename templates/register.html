<!DOCTYPE html>
<html>

<head>
    <title>{{ _('register') }}</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Your CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>

<body>

    <div class="top-header">

        <!-- Left: Logo -->
        <div class="logo">
            <img src="{{ url_for('static', filename='images/logo.jpeg') }}" alt="logo">
        </div>

        <!-- Center: Title -->
        <div class="title">
            GrievTech
        </div>

        <!-- Right: Language -->
        <div class="lang">
            <select onchange="location = this.value;" class="form-select form-select-sm d-inline-block w-auto"
                style="border-radius: 8px; padding: 4px 8px;">
                <option value="/set_language/en" {% if lang=='en' %}selected{% endif %}>English</option>
                <option value="/set_language/kn" {% if lang=='kn' %}selected{% endif %}>ಕನ್ನಡ</option>
                <option value="/set_language/hi" {% if lang=='hi' %}selected{% endif %}>हिंदी</option>
                <option value="/set_language/ta" {% if lang=='ta' %}selected{% endif %}>தமிழ்</option>
                <option value="/set_language/te" {% if lang=='te' %}selected{% endif %}>తెలుగు</option>
            </select>
        </div>

    </div>

    <!-- 🔹 CENTER CONTAINER -->
    <div class="container d-flex justify-content-center align-items-center vh-100">

        <!-- 🔥 FIXED HERE -->
        <div class="form-container glass-card" style="width: 350px;">

            <h3 class="text-center mb-3">{{ _('register') }}</h3>

            <form method="POST" autocomplete="off">

                <!-- 🔹 STEP 1 -->
                <input type="text" name="name" placeholder="{{ _('name') }}" autocomplete="off" required>
                <input type="email" name="email" placeholder="{{ _('email') }}" autocomplete="off" required>
                <input type="password" name="password" placeholder="{{ _('password') }}" autocomplete="new-password"
                    required>

                {% if not show_otp %}
                <button type="submit" name="action" value="send_otp">
                    Send OTP
                </button>
                {% endif %}

                <!-- 🔹 STEP 2 (ONLY AFTER OTP SENT) -->
                {% if show_otp %}
                <input type="text" name="otp" placeholder="Enter OTP" required>

                <button type="submit" name="action" value="verify_otp">
                    Register
                </button>
                {% endif %}

            </form>

            <div class="text-center mt-3">
                <p>
                    {{ _('already_account') }}
                    <a href="/login" class="fw-bold">{{ _('login') }}</a>
                </p>
                <a href="/" class="small text-muted text-decoration-none">
                    ← Back to Home
                </a>
            </div>

        </div>

    </div>

</body>

</html>
