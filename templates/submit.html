<!DOCTYPE html>
<html>

<head>
    <title>Submit Grievance</title>

    <!-- Bootstrap (optional but improves UI) -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>

<body class="bg-light">

    <!-- 🌐 Language switch -->
    <div style="text-align:right; padding:10px;">
        <a href="/set_language/en">English</a> |
        <a href="/set_language/kn">ಕನ್ನಡ</a>
    </div>

    <div class="container d-flex justify-content-center mt-5">

        <div class="card p-4 shadow" style="width: 500px;">

            <h2 class="text-center mb-3">{{ _('submit') }}</h2>

            <form method="POST" enctype="multipart/form-data">

                <!-- ✅ Category -->
                <div class="mb-3">
                    <select name="category" class="form-select" required>
                        <option value="">Select Problem Type</option>
                        <option value="Water">Water Problem</option>
                        <option value="Road">Road Problem</option>
                        <option value="Electricity">Electricity</option>
                        <option value="Garbage">Garbage</option>
                        <option value="Other">Other</option>
                    </select>
                </div>

                <!-- Title -->
                <div class="mb-3">
                    <input type="text" name="title" class="form-control" placeholder="{{ _('title') }}" required>
                </div>

                <!-- ✅ ONLY ONE Description (Textarea) -->
                <div class="mb-3">
                    <textarea id="description" name="description" class="form-control"
                        placeholder="{{ _('description') }}" rows="3" required></textarea>
                </div>

                <!-- 🎤 Voice Button -->
                <button type="button" onclick="startVoice()" class="btn btn-secondary w-100 mb-2">
                    🎤 Speak Complaint
                </button>

                <p id="voiceStatus" class="text-center text-muted" style="font-size:12px;"></p>

                <!-- Priority -->
                <div class="mb-3">
                    <select name="priority" class="form-select">
                        <option value="Normal">Normal</option>
                        <option value="Emergency">🚨 Emergency</option>
                    </select>
                </div>

                <!-- File Upload -->
                <div class="mb-3">
                    <input type="file" id="fileInput" name="file" class="form-control" accept="image/*,video/*">
                </div>

                <p style="color:red; font-size:14px; margin-top:5px;">
                    ⚠ Please upload a geotagged photo or video
                </p>

                <!-- ✅ Location Capture -->
                <input type="hidden" id="latitude" name="latitude">
                <input type="hidden" id="longitude" name="longitude">
                <p id="locationStatus" class="text-center text-muted fw-bold" style="font-size:13px;">📍 Fetching
                    location...</p>

                <!-- Submit -->
                <button type="submit" id="submitBtn" class="btn btn-primary w-100">
                    {{ _('submit') }}
                </button>

            </form>

            <br>
            <a href="/dashboard" class="btn btn-outline-secondary w-100">
                ← Back to Dashboard
            </a>

        </div>
    </div>

    <!-- 🎤 Voice Script -->
    <script>
        function startVoice() {
            const status = document.getElementById("voiceStatus");
            if (!('webkitSpeechRecognition' in window)) {
                alert("Voice recognition not supported in this browser (Use Chrome)");
                return;
            }
            const recognition = new webkitSpeechRecognition();
            let lang = "{{ session.get('lang') }}";
            recognition.lang = (lang === "kn") ? "kn-IN" : "en-IN";
            recognition.interimResults = false;

            recognition.onstart = function () { status.innerText = "🎤 Listening..."; };
            recognition.onresult = function (event) {
                let speech = event.results[0][0].transcript;
                let descBox = document.getElementById("description");
                descBox.value = descBox.value + " " + speech;
                status.innerText = "✔ Speech captured";
            };
            recognition.onerror = function () { status.innerText = "❌ Error occurred"; };
            recognition.onend = function () { status.innerText += " (Stopped)"; };
            recognition.start();
        }
    </script>

    <!-- Tesseract.js for OCR -->
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>

    <!-- 📍 Geolocation & OCR Script -->
    <script>
        window.locationSource = "none"; // global flag to track source

        document.addEventListener("DOMContentLoaded", function () {
            const latInput = document.getElementById('latitude');
            const lonInput = document.getElementById('longitude');
            const statusEl = document.getElementById('locationStatus');
            const submitBtn = document.getElementById('submitBtn');

            // 1. Get browser location by default
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(
                    function (position) {
                        // Only use browser location if OCR hasn't already found something better
                        if (window.locationSource !== "ocr") {
                            latInput.value = position.coords.latitude;
                            lonInput.value = position.coords.longitude;
                            statusEl.innerText = "📍 Device location captured successfully!";
                            statusEl.className = "text-center text-success fw-bold";
                            window.locationSource = "browser";
                        }
                    },
                    function (error) {
                        if (window.locationSource !== "ocr") {
                            statusEl.innerText = "⚠ Please allow location access.";
                            statusEl.className = "text-center text-danger fw-bold";
                        }
                    }
                );
            }

            // 2. OCR Scanning when a file is chosen
            document.getElementById('fileInput').addEventListener('change', async (e) => {
                const file = e.target.files[0];
                if (!file || !file.type.startsWith('image/')) return;

                submitBtn.disabled = true;
                statusEl.innerText = "🔍 Scanning photo for GPS text watermark...";
                statusEl.className = "text-center text-warning fw-bold";

                try {
                    const result = await Tesseract.recognize(file, 'eng');
                    const text = result.data.text;
                    console.log("OCR Result:", text);

                    // Robust Regex for "Lat 14.394083 Long 74.534866"
                    // Handles cases with or without degree symbols, colons, or spaces
                    const latMatch = text.match(/Lat[^\d-]*(-?\d+\.\d+)/i);
                    const lonMatch = text.match(/Lon[^\d-]*(-?\d+\.\d+)/i);

                    if (latMatch && lonMatch) {
                        latInput.value = latMatch[1];
                        lonInput.value = lonMatch[1];
                        window.locationSource = "ocr"; // LOCK THE SOURCE
                        statusEl.innerText = "🎯 Exact location extracted from photo watermark!";
                        statusEl.className = "text-center text-primary fw-bold";
                    } else {
                        if (window.locationSource !== "browser") {
                            statusEl.innerText = "⚠ No GPS watermark found. Using device location.";
                            statusEl.className = "text-center text-secondary fw-bold";
                        }
                    }
                } catch (err) {
                    console.error(err);
                    statusEl.innerText = "❌ OCR Failed. Using device location.";
                    statusEl.className = "text-center text-danger fw-bold";
                } finally {
                    submitBtn.disabled = false;
                }
            });
        });
    </script>

</body>

</html>
