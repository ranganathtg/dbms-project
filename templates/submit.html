<!DOCTYPE html>
<html>

<head>
    <title>Submit Grievance</title>

    <!-- Bootstrap (optional but improves UI) -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>

<body class="bg-light">



    <div class="container d-flex justify-content-center mt-5">

        <div class="card p-4 shadow" style="width: 500px;">

            <h2 class="text-center mb-3">{{ _('submit') }}</h2>

            <form method="POST" enctype="multipart/form-data">

                <!-- ✅ Category -->
                <div class="mb-3">
                    <select id="categorySelect" name="category" class="form-select" required>
                        <option value="">Select Problem Type</option>
                        <option value="Water">Water Problem</option>
                        <option value="Road">Road Problem</option>
                        <option value="Electricity">Electricity</option>
                        <option value="Garbage">Garbage</option>
                        <option value="Other">Other</option>
                    </select>
                </div>

                <!-- Title -->
                <div class="mb-3">
                    <input type="text" id="titleInput" name="title" class="form-control" placeholder="{{ _('title') }}" required>
                </div>

                <!-- ✅ ONLY ONE Description (Textarea) -->
                <div class="mb-3">
                    <textarea id="description" name="description" class="form-control"
                        placeholder="{{ _('description') }}" rows="3" required></textarea>
                </div>

                <!-- 🎯 Duplicate Detection Warning Box -->
                <div id="duplicate-warning" class="alert alert-warning p-2 mb-3" style="display: none; font-size: 13px; border-radius: 8px; border: 2px solid #ffc107; text-align: left;">
                    <strong>⚠️ Similar complaints already submitted:</strong>
                    <ul id="duplicate-list" class="mb-1 mt-1 pl-3"></ul>
                    <small class="text-muted">You can still submit your complaint, or track the existing ones.</small>
                </div>

                <!-- 🎤 Voice Button -->
                <button type="button" onclick="startVoice()" class="btn btn-secondary w-100 mb-2">
                    🎤 Speak Complaint
                </button>

                <p id="voiceStatus" class="text-center text-muted" style="font-size:12px;"></p>

                <!-- Priority -->
                <div class="mb-3">
                    <select name="priority" class="form-select">
                        <option value="Normal">Normal</option>
                        <option value="Emergency">🚨 Emergency</option>
                    </select>
                </div>

                <!-- File Upload -->
                <div class="mb-3">
                    <input type="file" id="fileInput" name="file" class="form-control" accept="image/*,video/*,.pdf">
                </div>

                <p style="color:red; font-size:14px; margin-top:5px;">
                    ⚠ Please upload a geotagged photo, video, or PDF
                </p>

                <!-- ✅ Location Capture -->
                <input type="hidden" id="latitude" name="latitude">
                <input type="hidden" id="longitude" name="longitude">
                <p id="locationStatus" class="text-center text-muted fw-bold" style="font-size:13px;">📍 Fetching
                    location...</p>

                <!-- Submit -->
                <button type="submit" id="submitBtn" class="btn btn-primary w-100">
                    {{ _('submit') }}
                </button>

            </form>


            <br>
            <a href="/dashboard" class="btn btn-outline-secondary w-100">
                ← Back to Dashboard
            </a>

        </div>
    </div>

    <!-- 🎤 Voice Script -->
    <script>
        function startVoice() {
            const status = document.getElementById("voiceStatus");
            if (!('webkitSpeechRecognition' in window)) {
                alert("Voice recognition not supported in this browser (Use Chrome)");
                return;
            }
            const recognition = new webkitSpeechRecognition();
            let lang = "{{ session.get('lang', 'en') }}";
            if (lang === "hi") {
                recognition.lang = "hi-IN";
            } else if (lang === "kn") {
                recognition.lang = "kn-IN";
            } else if (lang === "te") {
                recognition.lang = "te-IN";
            } else if (lang === "ta") {
                recognition.lang = "ta-IN";
            } else {
                recognition.lang = "en-IN";
            }
            recognition.interimResults = false;

            recognition.onstart = function () { status.innerText = "🎤 Listening..."; };
            recognition.onresult = function (event) {
                let speech = event.results[0][0].transcript;
                let descBox = document.getElementById("description");
                if (descBox.value) {
                    descBox.value += " " + speech;
                } else {
                    descBox.value = speech;
                }
                status.innerText = "✔ Speech captured";
            };
            recognition.onerror = function (event) { 
                status.innerText = "❌ Error occurred: " + event.error; 
                console.error("Speech Recognition Error:", event.error);
            };
            recognition.onend = function () { 
                if (!status.innerText.includes("Error")) {
                    status.innerText += " (Stopped)"; 
                }
            };
            recognition.start();
        }
    </script>

    <!-- Tesseract.js for OCR -->
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    
    <!-- EXIF parser for Geotagged Photos -->
    <script src="https://cdn.jsdelivr.net/npm/exifr/dist/lite.umd.js"></script>

    <!-- 📍 Geolocation, EXIF & OCR Script -->
    <script>
        window.locationSource = "none"; // global flag to track source

        document.addEventListener("DOMContentLoaded", function () {
            const latInput = document.getElementById('latitude');
            const lonInput = document.getElementById('longitude');
            const statusEl = document.getElementById('locationStatus');
            const submitBtn = document.getElementById('submitBtn');

            // 1. Get browser location by default
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(
                    function (position) {
                        // Only use browser location if photo hasn't already provided one
                        if (window.locationSource !== "ocr" && window.locationSource !== "exif") {
                            latInput.value = position.coords.latitude;
                            lonInput.value = position.coords.longitude;
                            statusEl.innerText = "📍 Device location captured successfully!";
                            statusEl.className = "text-center text-success fw-bold";
                            window.locationSource = "browser";
                        }
                    },
                    function (error) {
                        if (window.locationSource !== "ocr" && window.locationSource !== "exif") {
                            statusEl.innerText = "⚠ Please allow location access.";
                            statusEl.className = "text-center text-danger fw-bold";
                        }
                    }
                );
            }

            // 2. EXIF & OCR Scanning when a file is chosen
            document.getElementById('fileInput').addEventListener('change', async (e) => {
                const file = e.target.files[0];
                if (!file || !file.type.startsWith('image/')) return;

                submitBtn.disabled = true;
                statusEl.innerText = "🔍 Checking photo for location data...";
                statusEl.className = "text-center text-warning fw-bold";

                try {
                    // STEP 2A: Try reading exact EXIF GPS metadata first (Fastest and 100% accurate)
                    const exifData = await exifr.gps(file);
                    if (exifData && exifData.latitude && exifData.longitude) {
                        latInput.value = exifData.latitude;
                        lonInput.value = exifData.longitude;
                        window.locationSource = "exif"; // LOCK THE SOURCE
                        statusEl.innerText = "🎯 Exact location extracted from photo metadata!";
                        statusEl.className = "text-center text-primary fw-bold";
                        submitBtn.disabled = false;
                        return; // Stop here, no need for OCR
                    }
                } catch (err) {
                    console.warn("EXIF error or not found", err);
                }

                // STEP 2B: Fallback to OCR if EXIF fails (e.g. WhatsApp strips EXIF, leaving only watermark)
                statusEl.innerText = "🔍 No metadata found. Scanning photo watermark...";
                try {
                    const result = await Tesseract.recognize(file, 'eng', {
                        logger: m => {
                            if (m.status === 'recognizing text') {
                                statusEl.innerText = `🔍 Scanning watermark... ${Math.round(m.progress * 100)}%`;
                            }
                        }
                    });
                    
                    const text = result.data.text;
                    console.log("OCR Result:", text);

                    // Robust Regex for "Lat 14.394083 Long 74.534866"
                    // Handles misreads like 'Iat', '1at', 'Long' vs 'Lon', comma instead of dot, etc.
                    const latMatch = text.match(/[LI1]at[^\d-]*(-?\d+[.,]\d+)/i);
                    const lonMatch = text.match(/L[o0]n[^\d-]*(-?\d+[.,]\d+)/i);

                    if (latMatch && lonMatch) {
                        latInput.value = latMatch[1].replace(',', '.');
                        lonInput.value = lonMatch[1].replace(',', '.');
                        window.locationSource = "ocr"; // LOCK THE SOURCE
                        statusEl.innerText = "🎯 Exact location extracted from photo watermark!";
                        statusEl.className = "text-center text-primary fw-bold";
                    } else {
                        if (window.locationSource !== "browser") {
                            statusEl.innerText = "⚠ No location found in photo. Using device location.";
                            statusEl.className = "text-center text-secondary fw-bold";
                        } else {
                            statusEl.innerText = "📍 Photo scanned (No GPS). Using device location.";
                            statusEl.className = "text-center text-success fw-bold";
                        }
                    }
                } catch (err) {
                    console.error("OCR Error:", err);
                    statusEl.innerText = "❌ Scan Failed. Using device location.";
                    statusEl.className = "text-center text-danger fw-bold";
                } finally {
                    submitBtn.disabled = false;
                }
            });
        });
    </script>

    <!-- 🎯 Real-Time Duplicate Detection Script -->
    <script>
        document.addEventListener("DOMContentLoaded", function () {
            const titleInput = document.getElementById("titleInput");
            const categorySelect = document.getElementById("categorySelect");
            const warningBox = document.getElementById("duplicate-warning");
            const duplicateList = document.getElementById("duplicate-list");

            async function checkDuplicates() {
                const title = titleInput.value.trim();
                const category = categorySelect.value;

                if (title.length < 5 || !category) {
                    warningBox.style.display = "none";
                    return;
                }

                try {
                    const res = await fetch("/detect_duplicates", {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify({ title: title, category: category })
                    });
                    const data = await res.json();

                    if (data.duplicates && data.duplicates.length > 0) {
                        duplicateList.innerHTML = "";
                        data.duplicates.forEach(item => {
                            const li = document.createElement("li");
                            li.innerHTML = `<strong>#${item.id}</strong>: ${item.title} (Status: <span class="badge bg-secondary" style="font-size:10px;">${item.status}</span>) - <a href="/track/${item.id}" target="_blank" style="text-decoration:none;">Track 🔗</a>`;
                            duplicateList.appendChild(li);
                        });
                        warningBox.style.display = "block";
                    } else {
                        warningBox.style.display = "none";
                    }
                } catch (err) {
                    console.error("Duplicate check error:", err);
                }
            }

            let timeout = null;
            titleInput.addEventListener("input", function () {
                clearTimeout(timeout);
                timeout = setTimeout(checkDuplicates, 500);
            });
            categorySelect.addEventListener("change", checkDuplicates);
        });
    </script>

</body>

</html>
